<div class="order-summary-card">
    <div class="summary-title">
        <!-- ko i18n: 'Order Summary' --><!-- /ko -->
    </div>

    <div class="summary-totals-wrap">
        <!-- ko foreach: elems() -->
            <!-- ko template: getTemplate() --><!-- /ko -->
        <!-- /ko -->
    </div>

    <button type="button"
        class="complete-payment-btn"
        data-bind="click: placeOrder, enable: isPlaceOrderActionAllowed">
        <svg xmlns="http://www.w3.org/2000/svg" class="complete-payment-btn__icon" viewBox="0 0 20 20" aria-hidden="true" focusable="false">
            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
        </svg>
        <span class="complete-payment-btn__text">
            <!-- ko i18n: 'Complete Payment' --><!-- /ko -->
        </span>
    </button>

    <div class="secure-text">
        <svg xmlns="http://www.w3.org/2000/svg" class="secure-text__icon" viewBox="0 0 20 20" aria-hidden="true" focusable="false">
            <path fill-rule="evenodd" d="M2.166 4.999A11.954 11.954 0 0010 1.944 11.954 11.954 0 0017.834 5c.11.65.166 1.32.166 2.001 0 5.225-3.34 9.67-8 11.317C5.34 16.67 2 12.225 2 7c0-.682.057-1.35.166-2.001zm11.541 3.708a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
        </svg>
        <span class="secure-text__label">
            <!-- ko i18n: 'Payments are secure and encrypted.' --><!-- /ko -->
        </span>
    </div>
</div>
