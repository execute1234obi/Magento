<div class="checkout-item__thumbnail">
    <!-- ko foreach: getRegion('before_details') -->
        <!-- ko template: getTemplate() --><!-- /ko -->
    <!-- /ko -->
</div>

<div class="checkout-item__details">
    <strong class="product-item-name checkout-item__title" data-bind="html: getNameUnsanitizedHtml($parent)"></strong>

    <!-- ko if: hasDescription($parent) -->
    <div class="checkout-item__description" data-bind="text: getDescription($parent)"></div>
    <!-- /ko -->

    <div class="details-qty checkout-item__qty">
        <span class="label"><!-- ko i18n: 'QTY:' --><!-- /ko --></span>
        <span class="value" data-bind="text: $parent.qty.toLocaleString(window.LOCALE)"></span>
    </div>

    <!-- ko if: (JSON.parse($parent.options).length > 0)-->
    <div class="product options checkout-item__options" data-bind="mageInit: {'collapsible':{'openedState': 'active'}}">
        <span data-role="title" class="toggle"><!-- ko i18n: 'View Details' --><!-- /ko --></span>
        <div data-role="content" class="content">
            <strong class="subtitle"><!-- ko i18n: 'Options Details' --><!-- /ko --></strong>
            <dl class="item-options">
                <!--ko foreach: JSON.parse($parent.options)-->
                <dt class="label" data-bind="text: label"></dt>
                    <!-- ko if: ($data.full_view)-->
                    <!-- ko with: {full_viewUnsanitizedHtml: $data.full_view}-->
                    <dd class="values" data-bind="html: full_viewUnsanitizedHtml"></dd>
                    <!-- /ko -->
                    <!-- /ko -->
                    <!-- ko ifnot: ($data.full_view)-->
                    <!-- ko with: {valueUnsanitizedHtml: $data.value}-->
                    <dd class="values" data-bind="html: valueUnsanitizedHtml"></dd>
                    <!-- /ko -->
                    <!-- /ko -->
                <!-- /ko -->
            </dl>
        </div>
    </div>
    <!-- /ko -->
</div>

<div class="checkout-item__subtotal">
    <!-- ko foreach: getRegion('after_details') -->
        <!-- ko template: getTemplate() --><!-- /ko -->
    <!-- /ko -->
</div>

<!-- ko foreach: getRegion('item_message') -->
    <!-- ko template: getTemplate() --><!-- /ko -->
<!-- /ko -->
