<div class="opc-block-summary" data-bind="blockLoader: isLoading">
    <div class="summary-stack">
        <div class="order-summary-card">
            <div class="order-summary-card__header">
                <div class="summary-title">
                    <!-- ko i18n: 'Order Summary' --><!-- /ko -->
                </div>

                <div class="summary-reference" data-bind="text: summaryReference, visible: summaryReference"></div>
            </div>

            <div class="order-summary-card__body">
                <div class="summary-totals-wrap">
                    <table class="data table table-totals">
                        <caption class="table-caption" data-bind="i18n: 'Order Summary'"></caption>
                        <tbody data-bind="foreach: summaryRows">
                            <tr data-bind="css: rowClass">
                                <th class="mark" scope="row">
                                    <span data-bind="text: title"></span>
                                </th>
                                <td class="amount">
                                    <span class="price" data-bind="text: value, attr: {'data-label': title}"></span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="order-summary-card__footer summary-actions">
                <button type="button"
                    class="complete-payment-btn"
                    data-bind="click: placeOrder, enable: isPlaceOrderActionAllowed, attr: {'aria-label': $t('Complete Payment')}">
                    <svg xmlns="http://www.w3.org/2000/svg" class="complete-payment-btn__icon" viewBox="0 0 20 20" aria-hidden="true" focusable="false">
                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
                    </svg>
                    <span class="complete-payment-btn__text" data-bind="text: $t('Complete Payment')"></span>
                </button>

                <div class="secure-text">
                    <svg xmlns="http://www.w3.org/2000/svg" class="secure-text__icon" viewBox="0 0 20 20" aria-hidden="true" focusable="false">
                        <path fill-rule="evenodd" d="M2.166 4.999A11.954 11.954 0 0010 1.944 11.954 11.954 0 0017.834 5c.11.65.166 1.32.166 2.001 0 5.225-3.34 9.67-8 11.317C5.34 16.67 2 12.225 2 7c0-.682.057-1.35.166-2.001zm11.541 3.708a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
                    </svg>
                    <span class="secure-text__label" data-bind="text: $t('Payments are secure and encrypted.')"></span>
                </div>
            </div>
        </div>
    </div>
</div>
