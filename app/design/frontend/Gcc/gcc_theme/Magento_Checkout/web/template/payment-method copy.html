<div class="border rounded-xl p-4 cursor-pointer transition"
     data-bind="css: { 
        'border-blue-900 bg-blue-50': isChecked(),
        'border-gray-200': !isChecked()
     }">

    <label class="flex items-center justify-between cursor-pointer">

        <div class="flex items-center gap-3">
            <input type="radio"
                   class="accent-blue-900"
                   data-bind="attr: { 
                        id: getId(), 
                        value: getCode() 
                   }, 
                   checked: isChecked, 
                   click: selectPaymentMethod" />

            <span class="font-medium text-gray-800"
                  data-bind="text: getTitle()"></span>
        </div>

        <!-- Payment Logo -->
        <!-- ko if: getLogo -->
        <img data-bind="attr: { src: getLogo() }"
             class="h-6 object-contain"/>
        <!-- /ko -->

    </label>

</div>
