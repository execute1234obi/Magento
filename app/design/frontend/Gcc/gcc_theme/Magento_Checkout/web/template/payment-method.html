<div class="payment-method rounded-xl border border-gray-200 bg-white overflow-hidden"
     data-bind="css: {'ring-2 ring-blue-100 border-blue-400': (isChecked() == getCode())}">

  <!-- Title / Radio -->
  <div class="payment-method-title p-4 flex items-center gap-3 cursor-pointer"
       data-bind="click: selectPaymentMethod">

    <input type="radio"
           name="payment[method]"
           class="h-5 w-5"
           data-bind="
             attr: { id: getCode() },
             value: getCode(),
             checked: isChecked,
             click: selectPaymentMethod,
             visible: isRadioButtonVisible()
           " />

    <label class="flex-1 cursor-pointer" data-bind="attr: { for: getCode() }">
      <span class="font-medium text-gray-900" data-bind="text: getTitle()"></span>
      <div class="text-xs text-gray-500 mt-0.5">
        <!-- ko i18n: 'Fast & secure payment' --><!-- /ko -->
      </div>
    </label>

    <span class="text-xs px-2 py-1 rounded-full bg-gray-100 text-gray-700"
          data-bind="visible: (isChecked() == getCode())">
      <!-- ko i18n: 'Selected' --><!-- /ko -->
    </span>
  </div>

  <!-- ✅ Only render details for the selected method -->
  <!-- ko if: (isChecked() == getCode()) -->
  <div class="payment-method-content border-t border-gray-100 p-4 space-y-4">
    <!-- keep your existing inner regions/templates here as-is -->
    <!-- (messages, form fields, billing-address, agreements, place order, etc.) -->
    <!-- ko foreach: getRegion('messages') -->
      <!-- ko template: getTemplate() --><!-- /ko -->
    <!-- /ko -->

    <!-- ko foreach: getRegion('billing-address') -->
      <!-- ko template: getTemplate() --><!-- /ko -->
    <!-- /ko -->

    <!-- ko foreach: getRegion('before-place-order') -->
      <!-- ko template: getTemplate() --><!-- /ko -->
    <!-- /ko -->

    <!-- Place Order button is usually already inside your template.
         If it exists, just keep it; it will now show only once. -->
  </div>
  <!-- /ko -->

</div>
