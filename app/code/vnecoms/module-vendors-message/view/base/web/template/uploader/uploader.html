<div class="admin__field" visible="visible" css="$data.additionalClasses">
    <label class="admin__field-label" if="$data.label" attr="for: uid">
        <span text="label" attr="'data-config-scope': $data.scopeLabel"></span>
    </label>

    <div class="admin__field-control" css="'_with-tooltip': $data.tooltip">
        <div class="file-uploader" data-role="drop-zone" css="_loading: isLoading">
            <div class="file-uploader-area">
                <input type="file" afterRender="onElementRender" name="image"
                       attr="id: uid, multiple: isMultipleFiles" disable="disabled" />
                <label class="file-uploader-button abs-action-primary primary action btn btn-default" attr="for: uid">
                	<i class="message-icon-attachment"></i> <span translate="'Add Attachment'"></span>
                </label>
                <span class="extensions-allowed" data-bind="html: $t('Allowed files: ') + getFileTypesAllowed()"></span>
                <span class="file-uploader-spinner"></span>
                <render args="fallbackResetTpl" if="$data.showFallbackReset && $data.isDifferedFromDefault"></render>
            </div>

            <render args="tooltipTpl" if="$data.tooltip"></render>

            <div class="admin__field-note" if="$data.notice" attr="id: noticeId">
                <span html="notice"></span>
            </div>

            <label class="admin__field-error" if="error" attr="for: uid" text="error"></label>

            <each args="data: value, as: '$file'" render="$parent.getPreviewTmpl($file)"></each>
        </div>
    </div>
</div>
