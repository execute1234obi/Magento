<div class="data-grid-search-control-wrap profile-visitors-search-control-wrap">
    <div class="search-wrapper">
        <input class="admin__control-text data-grid-search-control" type="text"
            data-bind="i18n: placeholder,
                       attr: {id: index, placeholder: $t(placeholder), 'aria-label': $t(placeholder)},
                       textInput: inputValue, hasFocus: focused, keyboard: {13: apply.bind($data, false), 27: cancel}">
        <button class="action-submit" type="button" click="apply.bind($data, false)" attr="'aria-label': $t('Search')">
            <span translate="'Search'"></span>
        </button>
    </div>
</div>
