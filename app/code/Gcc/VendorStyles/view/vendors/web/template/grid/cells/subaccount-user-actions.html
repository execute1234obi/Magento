<div class="data-grid-cell-content gcc-subaccount-user-actions">
    <a class="gcc-subaccount-user-actions__link"
       repeat="foreach: $col.getVisibleActions($row()._rowIndex), item: '$action'"
       click="$col.getActionHandler($action())"
       text="$action().label"
       attr="target: $col.getTarget($action()), href: $action().href, 'aria-label': $action().ariaLabel, 'data-action': 'item-' + $action().index"></a>
</div>
