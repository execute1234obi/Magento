<div class="inbox-row-container"
     data-bind="attr: {
        'data-id': $row().message_id,
        'data-url': window.BASE_URL + 'vendors/message/view/index/id/' + $row().message_id
     }">

    <div class="inbox-main-content">
        <div class="inbox-subject">
            <span data-bind="text: $row().subject || 'No Subject'"></span>
            <span class="msg-count-badge" 
                  style="background: #e1e1e1; border-radius: 10px; padding: 2px 8px; font-size: 10px; margin-left: 5px;"
                  data-bind="text: $row().msg_count">
            </span>
        </div>

        <div class="inbox-sender">
            <span data-bind="text: $row().sender_name"></span>
            <small style="color: #ccc;">
                (#<span data-bind="text: $row().message_id"></span>)
            </small>
        </div>
    </div>

    <div class="inbox-date-wrapper">
        <span class="inbox-date"
              data-bind="text: $row().created_at"></span>
    </div>
</div>
